name: Devnet Build and Deploy

on:
  workflow_dispatch:
    inputs:
      priority_fee:
        description: "Priority fee for transactions"
        required: true
        default: "300000"
        type: string

jobs:
  build:
    uses: solana-developers/github-workflows/.github/workflows/reusable-build.yaml@v0.3.0
    with:
      program: "workflow_tutorial"
      program-id: "wocur7QRRMdzPZN52688gBa5iJD4mLkNWSxN5xGGRjY"
      network: "devnet"
      deploy: true
      upload_idl: true
      verify: false
      use-squads: false
      use-program-metadata-idl: true
      override-solana-version: "3.1.10"
      override-anchor-version: "1.0.1"
      priority-fee: ${{ github.event.inputs.priority_fee }}
    secrets:
      DEVNET_SOLANA_DEPLOY_URL: ${{ secrets.DEVNET_SOLANA_DEPLOY_URL }}
      DEVNET_DEPLOYER_KEYPAIR: ${{ secrets.DEVNET_DEPLOYER_KEYPAIR }}
      PROGRAM_ADDRESS_KEYPAIR: ${{ secrets.PROGRAM_ADDRESS_KEYPAIR }}